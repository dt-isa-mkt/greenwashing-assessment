const TOTAL_Q = SECTIONS.reduce((a, s) => a + s.questions.length, 0);

const getRiskLevel = (pct) => {
  if (pct >= 75) return {
    label: "Esposizione al rischio limitata",
    color: C.green, icon: "✅",
    tagline: "Il profilo comunicativo presenta criticità contenute. Aggiustamenti puntuali consigliati prima del 27 settembre 2026."
  };
  if (pct >= 40) return {
    label: "Esposizione al rischio significativa",
    color: C.orange, icon: "⚠️",
    tagline: "Riscontrate non conformità che richiedono intervento correttivo urgente sui contenuti di comunicazione prima del 27 settembre 2026."
  };
  return {
    label: "Esposizione al rischio elevata",
    color: C.red, icon: "🔴",
    tagline: "Molteplici violazioni potenziali rilevate. Rischio concreto di sanzioni AGCM a decorrere dal 27 settembre 2026. Intervento immediato necessario."
  };
};

const getDaysToDeadline = () => {
  const deadline = new Date("2026-09-27");
  const today = new Date();
  return Math.max(0, Math.ceil((deadline - today) / (1000 * 60 * 60 * 24)));
};

// ── PROGRESS BAR ─────────────────────────────────────────────────────────────
const ProgressBar = ({ answered, total }) => {
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  return (
    <div style={{ background: "#E8EEF3", borderRadius: 999, height: 8, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, ${C.cyanLight}, ${C.teal})`, borderRadius: 999, transition: "width 0.4s ease" }} />
    </div>
  );
};

// ── COMPLIANCE BUTTON ─────────────────────────────────────────────────────────
const CBtn = ({ opt, selected, onSelect }) => {
  const isSel = selected === opt.val;
  return (
    <button onClick={() => onSelect(opt.val)} style={{
      flex: 1, padding: "8px 4px", borderRadius: 8,
      border: isSel ? `2px solid ${opt.color}` : "2px solid #E8EEF3",
      background: isSel ? opt.color : "#F8FAFB",
      color: isSel ? "#fff" : "#464D62",
      fontSize: 11, fontWeight: isSel ? 700 : 500,
      cursor: "pointer", textAlign: "center", lineHeight: 1.3, transition: "all 0.15s",
    }}>
      {opt.label}
    </button>
  );
};

// ── SECTION CARD ─────────────────────────────────────────────────────────────
const SectionCard = ({ section, answers, onChange }) => {
  const [open, setOpen] = useState(true);
  const answered = section.questions.filter(q => answers[q.id] !== undefined).length;
  const hasAbsolutes = section.questions.some(q => q.label.startsWith("DIVIETO ASSOLUTO"));

  return (
    <div style={{ marginBottom: 24, borderRadius: 16, overflow: "hidden", border: "1px solid #E8EEF3", background: C.white }}>
      <div onClick={() => setOpen(o => !o)} style={{
        background: `linear-gradient(135deg, ${section.color} 0%, ${section.color}cc 100%)`,
        padding: "16px 20px", cursor: "pointer",
        display: "flex", justifyContent: "space-between", alignItems: "center"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 26 }}>{section.icon}</span>
          <div>
            <div style={{ color: "#fff", fontWeight: 800, fontSize: 16 }}>{section.n} — {section.title}</div>
            <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 11, marginTop: 2 }}>{section.subtitle}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          {hasAbsolutes && (
            <div style={{ background: "rgba(255,255,255,0.25)", borderRadius: 6, padding: "3px 8px", color: "#fff", fontSize: 10, fontWeight: 700 }}>
              DIVIETI ASSOLUTI
            </div>
          )}
          <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 20, padding: "3px 12px", color: "#fff", fontSize: 12 }}>
            {answered}/{section.questions.length}
          </div>
          <span style={{ color: "#fff", fontSize: 16 }}>{open ? "▲" : "▼"}</span>
        </div>
      </div>

      {open && (
        <div style={{ padding: "16px 20px", background: section.accent }}>
          <div style={{ background: C.white, borderLeft: `4px solid ${section.color}`, padding: "10px 14px", borderRadius: "0 8px 8px 0", marginBottom: 16, fontSize: 12, color: "#464D62", lineHeight: 1.6 }}>
            <strong>📋 Base normativa:</strong> {section.note}
          </div>

          {section.questions.map(q => {
            const val = answers[q.id];
            const isAbsolute = q.label.startsWith("DIVIETO ASSOLUTO");
            return (
              <div key={q.id} style={{
                background: C.white, borderRadius: 12, padding: "14px 16px", marginBottom: 12,
                border: isAbsolute ? `2px solid ${C.red}44` : "1px solid #E8EEF3",
              }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
                    <div style={{
                      background: q.prio === 1 ? C.red : C.orange, color: "#fff",
                      borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700, textAlign: "center",
                    }}>
                      {q.prio === 1 ? "CRITICO" : "RILEVANTE"}
                    </div>
                    {isAbsolute && (
                      <div style={{ background: C.red, color: "#fff", borderRadius: 6, padding: "2px 5px", fontSize: 9, fontWeight: 700, textAlign: "center" }}>
                        ART. 23
                      </div>
                    )}
                  </div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 13, color: C.grey, marginBottom: 4 }}>
                      {isAbsolute
                        ? <span style={{ color: C.red }}>⛔ {q.label.replace("DIVIETO ASSOLUTO — ", "")}</span>
                        : q.label}
                    </div>
                    <div style={{ fontSize: 12, color: "#464D62", lineHeight: 1.6 }}>{q.desc}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                  {COMPLIANCE.map(opt => (
                    <CBtn key={opt.val} opt={opt} selected={val} onSelect={v => onChange(q.id, v)} />

      )}

// ── GENERATORE PDF ────────────────────────────────────────────────────────────
const generatePDF = (answers, formData, sectionScores, criticalGaps, warnings, totalPct, riskLevel) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const W = 210, H = 297;

  const teal   = [0, 127, 163];
  const green  = [78, 167, 46];
  const grey   = [63, 63, 63];
  const orange = [98, 188, 208];
  const cream  = [255, 255, 255];
  const red    = [234, 0, 72];
  const white  = [255, 255, 255];
  const lightg = [229, 231, 235];

  const riskRGB = totalPct >= 75 ? green : totalPct >= 40 ? orange : red;
  const riskLabel = riskLevel.label;

  // Logo immagine — aspect ratio: ISA=2.563
  const drawLogo = (x, y, inv, h) => {
    const logoH = h || 12;
    try {
      if (inv) {
        // Sfondo scuro → logo bianco
        const logoW = Math.round(logoH * 2.563);
        doc.addImage(LOGO_WHITE_B64, "PNG", x, y, logoW, logoH);
      } else {
        // Sfondo chiaro → logo colore
        const logoW = Math.round(logoH * 2.563);
        doc.addImage(LOGO_B64, "PNG", x, y, logoW, logoH);
      }
    } catch(e) {
      // Fallback testo
      doc.setTextColor(inv ? 255 : 83, inv ? 255 : 82, inv ? 255 : 78);
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      doc.text("ISA Digital Consulting", x, y + logoH * 0.65);
    }
  };

  const addFooter = () => {
    doc.setFillColor(...grey);
    doc.rect(0, H - 11, W, 11, "F");
    doc.setTextColor(...white);
    doc.setFontSize(6);
    doc.setFont("helvetica", "normal");
    doc.text("ISA Digital Consulting  |  isaitalia.it", W / 2, H - 6.5, { align: "center" });
    doc.text("D.Lgs. 30/2026 (GU n.56 del 9-3-2026) recepimento Dir. (UE) 2024/825  |  Applicazione: 27/09/2026  |  Assessment del " + new Date().toLocaleDateString("it-IT"), W / 2, H - 2.5, { align: "center" });
  };

  const addPageHeader = (title, col) => {
    doc.setFillColor(...(col || teal));
    doc.rect(0, 0, W, 16, "F");
    doc.setTextColor(...white);
    doc.setFontSize(9);
    doc.setFont("helvetica", "bold");
    doc.text(title, 15, 11);
    // Logo bianco in header pagine interne
    const logoHpx = 10;
    const logoWpx = Math.round(logoHpx * 2.563);
    drawLogo(W - logoWpx - 8, 3, true, logoHpx);
  };

  // ── PAG 1: COPERTINA ────────────────────────────────────────────────────────
  doc.setFillColor(...teal);
  doc.rect(0, 0, W, 52, "F");
  doc.setFillColor(...green);
  doc.rect(0, 48, W, 4, "F");

  // Logo bianco nel banner teal — destra, verticalmente centrato
  const covLogoH = 21;
  const covLogoW = Math.round(covLogoH * 2.563);
  drawLogo(W - covLogoW - 12, 8, true, covLogoH);

  // Titolo a sinistra nel banner
  doc.setTextColor(...white);
  doc.setFontSize(20);
  doc.setFont("helvetica", "bold");
  doc.text("Greenwashing Compliance Check", 15, 24);
  doc.setFontSize(8.5);
  doc.setFont("helvetica", "normal");
  doc.text("D.Lgs. 30 del 20 febbraio 2026  |  Recepimento Direttiva (UE) 2024/825", 15, 34);
  doc.text("Applicazione a decorrere dal 27 settembre 2026", 15, 41);

  let y = 60;

  // Score hero
  doc.setFillColor(...cream);
  doc.roundedRect(15, y, W - 30, 44, 5, 5, "F");

  doc.setTextColor(...riskRGB);
  doc.setFontSize(42);
  doc.setFont("helvetica", "bold");
  doc.text(`${totalPct}%`, 28, y + 31);

  const scoreW = doc.getTextWidth(`${totalPct}%`);
  doc.setDrawColor(...riskRGB);
  doc.setLineWidth(0.3);
  doc.line(28 + scoreW + 5, y + 8, 28 + scoreW + 5, y + 36);

  doc.setTextColor(...grey);
  doc.setFontSize(12);
  doc.setFont("helvetica", "bold");
  doc.text(riskLabel, 28 + scoreW + 10, y + 16);
  doc.setFontSize(7.5);
  doc.setFont("helvetica", "normal");
  const tagLines = doc.splitTextToSize(riskLevel.tagline, 108);
  doc.text(tagLines, 28 + scoreW + 10, y + 25);
  doc.setFontSize(6.5);
  doc.setTextColor(160, 160, 160);
  doc.text(`${TOTAL_Q} indicatori valutati`, 28 + scoreW + 10, y + 39);

  // Deadline banner
  y += 50;
  const days = getDaysToDeadline();
  const dColor = days < 90 ? red : days < 180 ? orange : teal;
  doc.setFillColor(...dColor);
  doc.roundedRect(15, y, W - 30, 11, 3, 3, "F");
  doc.setTextColor(...white);
  doc.setFontSize(8);
  doc.setFont("helvetica", "bold");
  doc.text(`${days} giorni al 27 settembre 2026  —  piena applicazione del D.Lgs. 30/2026`, W / 2, y + 7.5, { align: "center" });

  // Anagrafica
  y += 16;
  doc.setFillColor(...white);
  doc.roundedRect(15, y, W - 30, 38, 4, 4, "F");
  doc.setDrawColor(...teal);
  doc.setLineWidth(0.4);
  doc.roundedRect(15, y, W - 30, 38, 4, 4, "S");
  doc.setFillColor(...teal);
  doc.roundedRect(15, y, 26, 38, 3, 3, "F");
  doc.setTextColor(...white);
  doc.setFontSize(7);
  doc.setFont("helvetica", "bold");
  doc.text("IMPRESA", 17, y + 21);

  const fields = [
    ["Ragione sociale", formData.azienda || "—"],
    ["Settore",         formData.settore  || "—"],
    ["Referente",       formData.nome     || "—"],
    ["Email",           formData.email    || "—"],
    ["Dimensione",      formData.dimensione || "—"],
    ["Data",            new Date().toLocaleDateString("it-IT")],
  ];
  doc.setFont("helvetica", "normal");
  doc.setTextColor(...grey);
  doc.setFontSize(7.5);
  fields.forEach((f, i) => {
    const col = i % 2 === 0 ? 46 : 130;
    const row = Math.floor(i / 2);
    const ly = y + 9 + row * 10;
    doc.setFont("helvetica", "bold");
    doc.text(`${f[0]}:`, col, ly);
    doc.setFont("helvetica", "normal");
    doc.text(f[1], col + 24, ly);
  });

  // ── Mini-riepilogo sezioni in copertina ──────────────────────────────────
  y += 44;
  doc.setTextColor(...grey);
  doc.setFontSize(8.5);
  doc.setFont("helvetica", "bold");
  doc.text("Conformita' per area normativa", 15, y);
  y += 6;

  const sColorsP1 = [teal, green, orange, grey, teal];
  sectionScores.forEach((s, i) => {
    const col = sColorsP1[i] || grey;
    const sPct = s.pct;
    const barColor = sPct >= 75 ? green : sPct >= 40 ? orange : red;

    // Riga sezione
    doc.setFillColor(...white);
    doc.roundedRect(15, y, W - 30, 14, 2, 2, "F");
    doc.setFillColor(...col);
    doc.roundedRect(15, y, 5, 14, 1, 1, "F");

    // Testo sezione
    doc.setTextColor(...grey);
    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    doc.text(`${s.n}  ${s.title}`, 25, y + 5.5);
    doc.setFontSize(6);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(160, 160, 160);
    const nc = s.questions.filter(q => answers[q.id] === 1).length;
    const dv = s.questions.filter(q => answers[q.id] === 2).length;
    const ok = s.questions.filter(q => answers[q.id] === 3).length;
    doc.setTextColor(...red);    doc.text(`NC:${nc}`, 25, y + 11);
    doc.setTextColor(...orange); doc.text(`DV:${dv}`, 38, y + 11);
    doc.setTextColor(...green);  doc.text(`OK:${ok}`, 51, y + 11);

    // Mini barra
    const bx = 120, bw = 52;
    doc.setFillColor(...lightg);
    doc.roundedRect(bx, y + 4, bw, 5, 1, 1, "F");
    if (sPct > 0) {
      doc.setFillColor(...barColor);
      doc.roundedRect(bx, y + 4, Math.max(bw * sPct / 100, 1), 5, 1, 1, "F");
    }
    doc.setTextColor(...barColor);
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.text(`${sPct}%`, W - 17, y + 9, { align: "right" });

    y += 17;
  });

  addFooter();

  // ── PAG 2: GAP ──────────────────────────────────────────────────────────────
  if (criticalGaps.length > 0 || warnings.length > 0) {
    doc.addPage();
    doc.setFillColor(...cream);
    doc.rect(0, 0, W, H, "F");
    addPageHeader(`Criticita' rilevate  |  ${criticalGaps.length} non conformi  |  ${warnings.length} da verificare`, red);
    y = 24;

    const renderGapBox = (g, col, badge) => {
      if (y > H - 34) { addFooter(); doc.addPage(); doc.setFillColor(...cream); doc.rect(0, 0, W, H, "F"); addPageHeader("Criticita' rilevate (segue)", red); y = 24; }
      const isAbs = g.label.startsWith("DIVIETO ASSOLUTO");
      const cleanLabel = g.label.replace("DIVIETO ASSOLUTO — ", "");
      const lLines = doc.splitTextToSize(cleanLabel, 120);
      const boxH = lLines.length > 1 ? 30 : 24;

      doc.setFillColor(...white);
      doc.roundedRect(15, y, W - 30, boxH, 3, 3, "F");
      doc.setFillColor(...col);
      doc.roundedRect(15, y, 8, boxH, 2, 2, "F");

      // Numero
      doc.setTextColor(...white);
      doc.setFontSize(7.5);
      doc.setFont("helvetica", "bold");
      doc.text(`${g.n}`, 19, y + boxH / 2 + 2, { align: "center" });

      // Label
      doc.setTextColor(...grey);
      doc.setFontSize(8.5);
      doc.setFont("helvetica", "bold");
      doc.text(lLines[0], 28, y + 9);
      if (lLines[1]) doc.text(lLines[1], 28, y + 15);

      // Sezione + priorità
      doc.setFontSize(6.5);
      doc.setFont("helvetica", "normal");
      doc.setTextColor(150, 150, 150);
      const metaY = lLines[1] ? y + 22 : y + 16;
      doc.text(g.section.title + "  |  " + (g.prio === 1 ? "CRITICO" : "RILEVANTE") + (isAbs ? "  |  Art. 23 — vietato in ogni caso" : ""), 28, metaY);

      // Badge
      const bW = 32, bH = 7;
      const bX = W - 17 - bW;
      doc.setFillColor(...col);
      doc.roundedRect(bX, y + boxH / 2 - bH / 2, bW, bH, 2, 2, "F");
      doc.setTextColor(...white);
      doc.setFontSize(6);
      doc.setFont("helvetica", "bold");
      doc.text(badge, bX + bW / 2, y + boxH / 2 + 1.5, { align: "center" });

      y += boxH + 5;
    };

    if (criticalGaps.length > 0) {
      doc.setTextColor(...red);
      doc.setFontSize(9);
      doc.setFont("helvetica", "bold");
      doc.text(`NON CONFORMI (${criticalGaps.length})  —  Azione correttiva immediata prima del 27/09/2026`, 15, y);
      y += 7;
      criticalGaps.forEach(g => renderGapBox(g, red, "NON CONFORME"));
    }

    if (warnings.length > 0) {
      y += 4;
      if (y > H - 24) { addFooter(); doc.addPage(); doc.setFillColor(...cream); doc.rect(0, 0, W, H, "F"); addPageHeader("Da verificare (segue)", orange); y = 24; }
      doc.setTextColor(...orange);
      doc.setFontSize(9);
      doc.setFont("helvetica", "bold");

                {/*   <span>🏷️ Packaging</span>
                <span>🌐 Sito web</span>
                <span>📱 Social media</span>
                <span>📢 Pubblicità</span>
                <span>📄 Cataloghi</span>
          */}      
              </div>
                
              </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 28 }}>
              {[
                { icon: "⛔", title: "4 divieti assoluti", desc: "Claim generici non sostanziati, etichette non certificate, carbon neutral da offset, asserzioni parziali sull'intero prodotto/impresa", color: C.red },
                { icon: "🎯", title: "Impegni futuri regolati", desc: "Net zero e obiettivi climatici futuri richiedono piano verificabile, obiettivi misurabili e verifica periodica da terzo indipendente", color: C.orange },
                { icon: "🔧", title: "Durabilità e riparabilità", desc: "Nuovi divieti assoluti su affermazioni false di durabilità e riparabilità. Nuovi obblighi informativi precontrattuali", color: C.teal },
                { icon: "⚖️", title: "Sanzioni AGCM", desc: "Le violazioni sono perseguibili come pratiche commerciali sleali. Autorità competente: AGCM. Nessuna valutazione caso per caso per i divieti Art. 23", color: C.grey },
              ].map(b => (
                <div key={b.title} style={{ background: C.white, borderRadius: 12, padding: "16px 18px", border: `1px solid ${b.color}33` }}>
                  <div style={{ fontSize: 22, marginBottom: 7 }}>{b.icon}</div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: b.color, marginBottom: 5 }}>{b.title}</div>
                  <div style={{ fontSize: 12, color: "#464D62", lineHeight: 1.55 }}>{b.desc}</div>
                </div>
              ))}
            </div>

            <div style={{ background: C.white, borderRadius: 16, padding: "24px", border: "1px solid #E8EEF3", textAlign: "center" }}>
              <div style={{ fontSize: 14, color: "#8A9BB0", marginBottom: 20 }}>
                <strong style={{ color: C.grey }}>18 domande</strong> · 5 aree normative · ~10 minuti · Report PDF scaricabile
              </div>
              <button onClick={() => setStep("form")} style={{
                background: `linear-gradient(135deg, ${C.teal}, ${C.green})`, color: "#fff",
                border: "none", borderRadius: 12, padding: "16px 44px", fontSize: 16, fontWeight: 700, cursor: "pointer",
              }}>
                Avvia il Check →
              </button>
            </div>
          </div>
        )}

        {/* ── FORM ── */}
        {step === "form" && (
          <div style={{ maxWidth: 560, margin: "0 auto" }}>
            <div style={{ background: C.white, borderRadius: 20, padding: "32px 36px", border: "1px solid #E8EEF3" }}>
              <Logo />
              <h2 style={{ fontSize: 20, fontWeight: 800, color: C.grey, marginTop: 18, marginBottom: 6 }}>Dati impresa</h2>
              <p style={{ fontSize: 13, color: "#8A9BB0", marginBottom: 22, lineHeight: 1.5 }}>
                Compila i campi per personalizzare il report. I dati saranno utilizzati esclusivamente da ISA Digital Consulting per seguire l'assessment.
              </p>

              {[
                { key: "nome",    label: "Nome e cognome referente *",    placeholder: "Es. Mario Rossi",          type: "text" },
                { key: "azienda", label: "Ragione sociale *",             placeholder: "Es. Rossi SRL",            type: "text" },
                { key: "ruolo",   label: "Ruolo / funzione",              placeholder: "Es. Marketing Manager",    type: "text" },
                { key: "email",   label: "Email aziendale *",             placeholder: "mario@rossi.it",           type: "email" },
                { key: "settore", label: "Settore di attività",           placeholder: "Es. Alimentare, Moda, Cosmetica…", type: "text" },
              ].map(f => (
                <div key={f.key} style={{ marginBottom: 14 }}>
                  <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.grey, marginBottom: 5 }}>{f.label}</label>
                  <input
                    type={f.type}
                    placeholder={f.placeholder}
                    value={formData[f.key]}
                    onChange={e => setFormData(p => ({ ...p, [f.key]: e.target.value }))}
                    style={{
                      width: "100%", padding: "11px 14px", borderRadius: 10,
                      border: formErr[f.key] ? `2px solid ${C.orange}` : "2px solid #E8EEF3",
                      fontSize: 14, outline: "none", background: C.cream, boxSizing: "border-box",
                    }}
                  />
                </div>
              ))}

              <div style={{ marginBottom: 22 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.grey, marginBottom: 5 }}>Dimensione impresa *</label>
                <select
                  value={formData.dimensione}
                  onChange={e => setFormData(p => ({ ...p, dimensione: e.target.value }))}
                  style={{
                    width: "100%", padding: "11px 14px", borderRadius: 10,
                    border: formErr.dimensione ? `2px solid ${C.orange}` : "2px solid #E8EEF3",
                    fontSize: 14, background: C.cream, outline: "none",
                  }}
                >
                  <option value="">Seleziona…</option>
                  <option>1–9 (microimpresa)</option>
                  <option>10–49 (piccola impresa)</option>
                  <option>50–249 (media impresa)</option>
                  <option>250+ (grande impresa)</option>
                </select>
              </div>

              <div style={{ fontSize: 11, color: "#9AAAB8", marginBottom: 18 }}>
                ✓ I dati saranno utilizzati esclusivamente per personalizzare il report e per eventuali comunicazioni di ISA Digital Consulting.
              </div>

              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={() => setStep("welcome")} style={{ flex: 1, padding: "13px", borderRadius: 12, border: "2px solid #E8EEF3", background: C.white, color: "#8A9BB0", fontSize: 14, cursor: "pointer" }}>
                  ← Indietro
                </button>
                <button
                  onClick={() => { if (validateForm()) setStep("assessment"); }}
                  style={{ flex: 2, background: `linear-gradient(135deg, ${C.teal}, ${C.green})`, color: "#fff", border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}
                >
                  Avvia la valutazione →
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── ASSESSMENT ── */}
        {step === "assessment" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <h2 style={{ fontSize: 24, fontWeight: 800, color: C.grey, marginBottom: 8 }}>Greenwashing Compliance Check</h2>
              <p style={{ color: "#8A9BB0", fontSize: 14, marginBottom: 16 }}>
                Per ogni indicatore, seleziona lo stato di conformità delle comunicazioni commerciali della tua impresa.
              </p>
              <div style={{ maxWidth: 500, margin: "0 auto" }}>
                <ProgressBar answered={answeredCount} total={TOTAL_Q} />
                <div style={{ fontSize: 12, color: "#9AAAB8", marginTop: 6 }}>{answeredCount} su {TOTAL_Q} indicatori valutati</div>
              </div>
            </div>

            <div style={{ background: C.white, borderRadius: 12, padding: "14px 20px", marginBottom: 24, display: "flex", gap: 16, flexWrap: "wrap", justifyContent: "center", border: "1px solid #E8EEF3" }}>
              <div style={{ fontSize: 12, color: "#464D62", fontWeight: 600, alignSelf: "center" }}>Per ogni indicatore:</div>
              {COMPLIANCE.map(r => (
                <div key={r.val} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "#464D62" }}>
                  <div style={{ width: 12, height: 12, borderRadius: "50%", background: r.color, flexShrink: 0 }} />
                  <span><strong>{r.label}</strong> — {r.desc}</span>
                </div>
              ))}
            </div>

            {SECTIONS.map(s => (
              <SectionCard key={s.id} section={s} answers={answers} onChange={handleAnswer} />
            ))}

            <div style={{ textAlign: "center", marginTop: 32, padding: "28px", background: C.white, borderRadius: 16, border: "1px solid #E8EEF3" }}>
              {!canSubmit && (
                <div style={{ fontSize: 13, color: C.orange, marginBottom: 12 }}>
                  Rispondi a tutte le {TOTAL_Q} domande per generare il report. Mancano ancora {TOTAL_Q - answeredCount} risposte.
                </div>
              )}
              <button
                onClick={goToResults}
                disabled={!canSubmit}
                style={{
                  background: canSubmit ? `linear-gradient(135deg, ${C.teal}, ${C.green})` : "#E8EEF3",
                  color: canSubmit ? "#fff" : "#9AAAB8",
                  border: "none", borderRadius: 14, padding: "18px 52px", fontSize: 16, fontWeight: 700,
                  cursor: canSubmit ? "pointer" : "not-allowed",
                }}
              >
                Genera il Report di Conformità →
              </button>
              <div style={{ fontSize: 12, color: "#9AAAB8", marginTop: 10 }}>
                {answeredCount}/{TOTAL_Q} domande compilate
              </div>
            </div>
          </div>
        )}

        {/* ── RESULTS ── */}
        {step === "results" && <ResultsView answers={answers} formData={formData} />}

      </div>

      {/* FOOTER
      <div style={{ background: C.grey, color: "#ccc", textAlign: "center", padding: "24px 20px 20px", fontSize: 12 }}>
        <Logo inverted />
        <div style={{ marginTop: 12 }}>
          ISA Digital Consulting — ESG & Digital Compliance per le imprese · isaitalia.it
        </div>
        <div style={{ marginTop: 6, opacity: 0.65, fontSize: 11 }}>
          Basato su: D.Lgs. 30 del 20 febbraio 2026 (GU n. 56 del 9-3-2026) · Direttiva (UE) 2024/825 del 28 febbraio 2024
        </div>
        <div style={{ marginTop: 4, opacity: 0.65, fontSize: 11 }}>
          ⚠️ Finalità orientativa. Non costituisce parere legale.
        </div>
      </div>
       */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(GreenwashingCheck));
  </script>
</body>
</html>
